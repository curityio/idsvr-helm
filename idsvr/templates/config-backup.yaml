{{- if and .Values.curity.admin.enabled .Values.curity.config.backup -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "curity.fullname" . }}-config-backup
type: Opaque
data:
  placeholder: Y3VyaXR5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "curity.fullname" . }}-backup-config-script
  labels:
        {{- include "curity.labels" . | nindent 4 }}
data:
  backupConfig.sh: |
    #!/bin/bash

    CA_CERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
    IFS=
    STATUS=$(/opt/idsvr/bin/status)
    IS_READY=$(echo $STATUS | awk -F':' '/isReady/ {print $2}')
    TRANSACTION_ID=$(echo $STATUS | awk -F':' '/transactionId/ {print $2}')

    if [ "$IS_READY" == "false" ]; then
      echo "transactionId=${TRANSACTION_ID} Skipping config backup because isReady=${IS_READY}"
    else
      CONFIG_BACKUP_XML=$(idsvr -d | sed  '/<cluster>/,/<\/cluster>/d' | base64 -w 0)

      DATE=$(date +%F)
      CONFIG_BACKUP_ITEM_NAME="${DATE}-${TRANSACTION_ID}.xml"

      echo "Backing up Config with name $CONFIG_BACKUP_ITEM_NAME"

      REQUEST_CONTENT="[{\"op\": \"add\", \"path\": \"/data/$CONFIG_BACKUP_ITEM_NAME\", \"value\": \"$CONFIG_BACKUP_XML\"}]"
      RESPONSE=$(openssl s_client -CAfile "$CA_CERT" -quiet -connect kubernetes.default:443 2>/dev/null <<EOF
    PATCH /api/v1/namespaces/$NAMESPACE/secrets/$SECRET_NAME HTTP/1.1
    Host: kubernetes.default
    Authorization: Bearer $TOKEN
    Connection: close
    Content-Type: application/json-patch+json
    Content-length: ${#REQUEST_CONTENT}
    Accept: application/json

    $REQUEST_CONTENT
    EOF
    )

      STATUS=$(printf '%s\n' "$RESPONSE" | grep -m1 '^HTTP/' | awk '{print $2}')
      echo "PATCH secret/$SECRET_NAME -> HTTP $STATUS"

      if [ "${STATUS:0:1}" != "2" ]; then
        # error body is safe to log (no secret data, just a Status object)
        printf '%s\n' "$RESPONSE" | sed -n '/^$/,$p' >&2
        exit 1
      fi
    fi

{{- end -}}

{{- range $postCommitScript := .Values.curity.config.postCommitScripts }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: post-commit-script-{{ $postCommitScript.name }}
data:
  script: |
{{ $postCommitScript.script | nindent 4 }}
{{- end }}
